<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>점심 룰렛</title>
<style>
body {
  text-align:center;
  font-family: Arial, sans-serif;
  background:#f7f7f7;
}
canvas {
  margin-top:30px;
}
button {
  margin-top:20px;
  padding:15px 30px;
  font-size:18px;
  border:none;
  background:#ff6b6b;
  color:white;
  border-radius:8px;
  cursor:pointer;
}
button:hover {
  opacity:0.8;
}
</style>
</head>
<body>

<h1>🍽 점심 메뉴 룰렛</h1>
<canvas id="wheel" width="500" height="500"></canvas>
<br>
<button onclick="spin()">돌리기 🎰</button>

<script>
const menus = [
"김치찌개","된장찌개","순두부찌개","부대찌개",
"삼겹살","제육볶음","닭갈비","불고기",
"비빔밥","돌솥비빔밥","국밥","설렁탕",
"갈비탕","삼계탕","냉면","막국수",
"쌈밥","보쌈","족발","곱창",
"짜장면","짬뽕","볶음밥","탕수육",
"마라탕","양꼬치","딤섬",
"초밥","라멘","우동","돈카츠",
"규동","텐동",
"파스타","피자","스테이크","햄버거",
"샌드위치","리조또",
"쌀국수","팟타이","커리",
"떡볶이","김밥","분식"
];

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
const radius = canvas.width/2;
let angle = 0;
let spinning = false;

function drawWheel(){
  const arc = 2*Math.PI/menus.length;
  for(let i=0;i<menus.length;i++){
    const start = i*arc;
    ctx.beginPath();
    ctx.fillStyle = i%2===0 ? "#FFD93D" : "#6BCB77";
    ctx.moveTo(radius,radius);
    ctx.arc(radius,radius,radius,start,start+arc);
    ctx.fill();

    ctx.save();
    ctx.translate(radius,radius);
    ctx.rotate(start+arc/2);
    ctx.fillStyle="black";
    ctx.font="14px Arial";
    ctx.fillText(menus[i],radius/2,5);
    ctx.restore();
  }
}

function spin(){
  if(spinning) return;
  spinning = true;

  const spinAngle = Math.random()*2000 + 2000;
  const duration = 3000;
  const start = Date.now();

  function animate(){
    const now = Date.now();
    const progress = (now-start)/duration;
    if(progress<1){
      angle = spinAngle*progress;
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.save();
      ctx.translate(radius,radius);
      ctx.rotate(angle*Math.PI/180);
      ctx.translate(-radius,-radius);
      drawWheel();
      ctx.restore();
      requestAnimationFrame(animate);
    }else{
      spinning = false;
      const arc = 360/menus.length;
      const deg = angle%360;
      const index = Math.floor((360-deg)/arc)%menus.length;
      alert("🎉 오늘의 메뉴: "+menus[index]);
    }
  }

  animate();
}

drawWheel();
</script>

</body>
</html>
