<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>점심 룰렛</title>
<style>
body {
  text-align:center;
  font-family:sans-serif;
  background:#f4f4f4;
}
canvas{
  margin-top:30px;
  background:white;
}
button{
  margin-top:20px;
  padding:10px 20px;
  font-size:18px;
}
</style>
</head>
<body>

<h1>🍽 점심 룰렛</h1>
<canvas id="wheel" width="400" height="400"></canvas>
<br>
<button onclick="spin()">🎰 돌리기</button>

<script>
const menus = [
"김치찌개","된장찌개","순두부찌개","부대찌개",
"삼겹살","제육볶음","닭갈비","불고기",
"비빔밥","국밥","설렁탕","갈비탕",
"짜장면","짬뽕","마라탕","초밥",
"라멘","돈카츠","파스타","피자"
];

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const center = 200;
const radius = 180;
let angle = 0;

function draw(){
  ctx.clearRect(0,0,400,400);

  const arc = 2*Math.PI/menus.length;

  for(let i=0;i<menus.length;i++){
    ctx.beginPath();
    ctx.moveTo(center,center);
    ctx.arc(center,center,radius,angle+i*arc,angle+(i+1)*arc);
    ctx.fillStyle = i%2==0 ? "#FFD580" : "#87CEFA";
    ctx.fill();
    ctx.save();
    ctx.translate(center,center);
    ctx.rotate(angle+(i+0.5)*arc);
    ctx.fillStyle="black";
    ctx.font="14px Arial";
    ctx.fillText(menus[i],70,0);
    ctx.restore();
  }

  // 🔺 화살표
  ctx.beginPath();
  ctx.moveTo(center-15,10);
  ctx.lineTo(center+15,10);
  ctx.lineTo(center,40);
  ctx.fillStyle="red";
  ctx.fill();
}

function spin(){
  let spinAngle = Math.random()*360+720;
  let duration = 3000;
  let start = null;

  function animate(timestamp){
    if(!start) start = timestamp;
    let progress = timestamp-start;
    let percent = Math.min(progress/duration,1);
    let ease = 1-Math.pow(1-percent,3);

    angle = (spinAngle*ease)*Math.PI/180;
    draw();

    if(percent<1){
      requestAnimationFrame(animate);
    }else{
      alert("오늘의 메뉴 👉 "+getResult());
    }
  }
  requestAnimationFrame(animate);
}

function getResult(){
  let degrees = angle*180/Math.PI;
  let arc = 360/menus.length;
  let index = Math.floor((360-(degrees%360))/arc)%menus.length;
  return menus[index];
}

draw();
</script>

</body>
</html>
