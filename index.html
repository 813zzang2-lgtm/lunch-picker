<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>룰렛</title>
<style>
body {
  text-align:center;
  font-family:sans-serif;
}

#wheel-container{
  position:relative;
  width:400px;
  margin:30px auto;
}

#wheel{
  width:400px;
  height:400px;
  border-radius:50%;
  border:10px solid #333;
  transition: transform 4s cubic-bezier(0.33,1,0.68,1);
}

#pointer{
  position:absolute;
  top:-10px;
  left:50%;
  transform:translateX(-50%);
  font-size:40px;
}
</style>
</head>
<body>

<h2>🎯 룰렛</h2>

<div id="wheel-container">
  <div id="pointer">🔻</div>
  <canvas id="wheel" width="400" height="400"></canvas>
</div>

<button onclick="spin()">돌리기</button>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const items = [
  "아메리카노",
  "치킨",
  "피자",
  "떡볶이",
  "햄버거",
  "라면"
];

const colors = [
  "#FF6B6B",
  "#FFD93D",
  "#6BCB77",
  "#4D96FF",
  "#A66DD4",
  "#FF8E3C"
];

const total = items.length;
const arc = 2 * Math.PI / total;

let currentRotation = 0;

function drawWheel() {
  for(let i=0; i<total; i++){
    ctx.beginPath();
    ctx.moveTo(200,200);
    ctx.arc(200,200,200, i*arc, (i+1)*arc);
    ctx.fillStyle = colors[i];
    ctx.fill();
    ctx.save();
    ctx.translate(200,200);
    ctx.rotate(i*arc + arc/2);
    ctx.textAlign="right";
    ctx.fillStyle="#000";
    ctx.font="16px sans-serif";
    ctx.fillText(items[i], 180, 10);
    ctx.restore();
  }
}

drawWheel();

function spin(){

  const selectedIndex = Math.floor(Math.random()*total);

  // 🎯 포인터는 위쪽(270도 = -90도) 기준
  const pointerAngle = 270 * Math.PI / 180;

  // 선택된 조각의 중앙각
  const selectedAngle = selectedIndex * arc + arc/2;

  // 최종 회전 각도 계산
  const rotateTo = (2*Math.PI*5) + (pointerAngle - selectedAngle);

  currentRotation += rotateTo;

  canvas.style.transform = `rotate(${currentRotation}rad)`;

  setTimeout(()=>{
    alert("🎉 결과: " + items[selectedIndex]);
  },4000);
}
</script>

</body>
</html>
