<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>점심 룰렛</title>
<style>
body {
  text-align: center;
  font-family: sans-serif;
  background: #f4f4f4;
}
canvas {
  margin-top: 30px;
  background: white;
}
button {
  margin-top: 20px;
  padding: 12px 24px;
  font-size: 18px;
  cursor: pointer;
}
</style>
</head>
<body>

<h1>🍽 점심 룰렛</h1>

<canvas id="wheel" width="400" height="400"></canvas>
<br>
<button onclick="spin()">🎰 돌리기</button>

<script>
const menus = [
"김치찌개","된장찌개","순두부찌개","부대찌개",
"삼겹살","제육볶음","닭갈비","불고기",
"비빔밥","국밥","설렁탕","갈비탕",
"짜장면","짬뽕","마라탕","초밥",
"라멘","돈카츠","파스타","피자"
];

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const center = 200;
const radius = 180;
let angle = 0;

function drawWheel() {
  ctx.clearRect(0, 0, 400, 400);

  const arc = 2 * Math.PI / menus.length;

  for (let i = 0; i < menus.length; i++) {
    const start = angle + i * arc;
    const end = start + arc;

    ctx.beginPath();
    ctx.moveTo(center, center);
    ctx.arc(center, center, radius, start, end);
    ctx.fillStyle = i % 2 === 0 ? "#FFD580" : "#87CEFA";
    ctx.fill();

    // 텍스트
    ctx.save();
    ctx.translate(center, center);
    ctx.rotate(start + arc / 2);
    ctx.fillStyle = "#000";
    ctx.font = "14px Arial";
    ctx.textAlign = "right";
    ctx.fillText(menus[i], radius - 10, 5);
    ctx.restore();
  }

  drawPointer();
}

function drawPointer() {
  ctx.beginPath();
  ctx.moveTo(center - 15, 10);
  ctx.lineTo(center + 15, 10);
  ctx.lineTo(center, 40);
  ctx.fillStyle = "red";
  ctx.fill();
}

function spin() {
  const spinAngle = Math.random() * 360 + 720;
  const duration = 4000;
  let startTime = null;

  function animate(timestamp) {
    if (!startTime) startTime = timestamp;

    const progress = timestamp - startTime;
    const percent = Math.min(progress / duration, 1);
    const easeOut = 1 - Math.pow(1 - percent, 3);

    angle = (spinAngle * easeOut) * Math.PI / 180;
    drawWheel();

    if (percent < 1) {
      requestAnimationFrame(animate);
    } else {
      const result = getResult();
      setTimeout(() => {
        alert("오늘의 메뉴 👉 " + result);
      }, 200);
    }
  }

  requestAnimationFrame(animate);
}

function getResult() {
  const arc = 2 * Math.PI / menus.length;

  // 화살표는 12시 방향 → -90도 보정
  let adjusted = angle - Math.PI / 2;

  adjusted = (adjusted % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);

  const index = Math.floor(adjusted / arc);

  return menus[(menus.length - index) % menus.length];
}

drawWheel();
</script>

</body>
</html>
