<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>🍱 점심 메뉴 돌림판</title>
<style>
body {
    text-align: center;
    font-family: Arial, sans-serif;
    background: #f4f4f4;
}

canvas {
    margin-top: 20px;
}

button {
    margin: 10px;
    padding: 10px 20px;
    font-size: 16px;
    cursor: pointer;
}

#result {
    font-size: 22px;
    margin-top: 20px;
    font-weight: bold;
}

.vote-box {
    margin-top: 20px;
}
</style>
</head>
<body>

<h1>🍱 점심 메뉴 돌림판</h1>

<canvas id="wheel" width="500" height="500"></canvas>

<br>
<button onclick="spin()">🎯 돌리기</button>

<div id="result"></div>

<hr>

<h2>🗳 팀원 투표</h2>
<div class="vote-box" id="voteBox"></div>

<script>
const menus = [
    "김치찌개",
    "제육볶음",
    "돈까스",
    "짜장면",
    "짬뽕",
    "초밥",
    "햄버거",
    "쌀국수",
    "부대찌개",
    "마라탕"
];

let votes = {};
menus.forEach(menu => votes[menu] = 0);

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
const radius = canvas.width / 2;
const colors = ["#FF6384","#36A2EB","#FFCE56","#8BC34A","#FF9800","#9C27B0","#00BCD4","#E91E63","#4CAF50","#795548"];

let startAngle = 0;

function drawWheel() {
    const arc = 2 * Math.PI / menus.length;
    for (let i = 0; i < menus.length; i++) {
        const angle = startAngle + i * arc;
        ctx.beginPath();
        ctx.fillStyle = colors[i % colors.length];
        ctx.moveTo(radius, radius);
        ctx.arc(radius, radius, radius, angle, angle + arc);
        ctx.lineTo(radius, radius);
        ctx.fill();

        ctx.save();
        ctx.fillStyle = "white";
        ctx.translate(radius, radius);
        ctx.rotate(angle + arc / 2);
        ctx.textAlign = "right";
        ctx.font = "16px Arial";
        ctx.fillText(menus[i], radius - 10, 10);
        ctx.restore();
    }
}

drawWheel();

let spinning = false;

function spin() {
    if (spinning) return;
    spinning = true;

    let spinAngle = Math.random() * 2000 + 2000;
    let spinTime = 0;
    let spinTimeTotal = 3000;

    function rotateWheel() {
        spinTime += 30;
        if (spinTime >= spinTimeTotal) {
            stopRotateWheel();
            return;
        }
        const spinAngleIncrement = spinAngle * (1 - spinTime / spinTimeTotal);
        startAngle += spinAngleIncrement * Math.PI / 180;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawWheel();
        requestAnimationFrame(rotateWheel);
    }

    rotateWheel();
}

function stopRotateWheel() {
    const arc = 2 * Math.PI / menus.length;
    const degrees = startAngle * 180 / Math.PI + 90;
    const arcd = arc * 180 / Math.PI;
    const index = Math.floor((360 - degrees % 360) / arcd);
    document.getElementById("result").innerText = 
        "🎉 오늘의 점심: " + menus[index];
    spinning = false;
}

// -----------------
// 🗳 투표 기능
// -----------------

const voteBox = document.getElementById("voteBox");

menus.forEach(menu => {
    const btn = document.createElement("button");
    btn.innerText = menu + " (0)";
    btn.onclick = () => {
        votes[menu]++;
        btn.innerText = menu + " (" + votes[menu] + ")";
    };
    voteBox.appendChild(btn);
});
</script>

</body>
</html>
